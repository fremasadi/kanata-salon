services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kanata-salon-app
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/storage/app
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: kanata-salon-mysql
    environment:
      MYSQL_DATABASE: kanata_salon
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  mysql_data:
  storage_data:
